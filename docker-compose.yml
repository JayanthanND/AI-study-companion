version: "3.9"

services:
  hindsight:
    image: python:3.11-slim
    ports:
      - "8888:8888"
    env_file:
      - .env
    command: sh -c "pip install --no-cache-dir hindsight-api && hindsight-api"
    networks:
      - app-network

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HINDSIGHT_BASE_URL=http://hindsight:8888
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - hindsight
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
