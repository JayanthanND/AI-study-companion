version: "3.9"

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    networks:
      - app-network

  hindsight:
    image: python:3.11-slim
    ports:
      - "8888:8888"
    env_file:
      - .env
    command: sh -c "export HINDSIGHT_API_LLM_API_KEY=${HINDSIGHT_API_LLM_API_KEY:-$GROQ_API_KEY} && pip install --no-cache-dir hindsight-api && hindsight-api"
    networks:
      - app-network

  backend:
    build: ./backend
    ports:
      # Avoid host port conflicts with other projects.
      # Backend still listens on 8000 *inside* the Docker network.
      - "8001:8000"
    env_file:
      - .env
    environment:
      # Use local Mongo inside Docker to avoid external TLS/network issues.
      - DATABASE_URL=mongodb://mongo:27017
      - DATABASE_NAME=studycompanion
      # Hindsight API URL inside docker network
      - HINDSIGHT_BASE_URL=http://hindsight:8888
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - hindsight
      - mongo
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      args:
        # IMPORTANT: This value is used in browser-side fetches (NEXT_PUBLIC_*)
        # so it must be reachable from the user's host (where the browser runs),
        # not from inside the Docker network.
        NEXT_PUBLIC_API_URL: http://localhost:8001
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
